<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Kladionica SP 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="auth-screen" class="auth-wrap" style="display:none;">
    <div class="auth-card">
      <div class="auth-logo">⚽</div>
      <h1>Kladionica SP 2026</h1>
      <p>Unesite lozinku za pristup natjecanju.</p>
      <form id="auth-form" autocomplete="on">
        <input id="auth-pwd" type="password" placeholder="Lozinka" autocomplete="current-password" autofocus />
        <button type="submit" class="btn btn--block">Uđi</button>
        <div id="auth-err" class="auth-err"></div>
      </form>
      <div class="auth-foot">Svjetsko prvenstvo · grupna faza</div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none;">
    <header class="appbar">
      <div class="appbar-inner">
        <a class="brand" href="#/poredak">
          <span class="brand-mark">⚽</span>
          <span class="brand-text">Kladionica <b>SP 2026</b></span>
        </a>
        <nav class="tabs" id="tabs"></nav>
        <div class="appbar-right">
          <span id="role-badge" class="role-badge"></span>
          <button class="logout" id="logout-btn" title="Odjava">Odjava</button>
        </div>
      </div>
    </header>

    <main class="content" id="content">
      <div class="loading"><span class="spinner"></span>Učitavanje…</div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
