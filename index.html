<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kladionica SP 2026</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #111111;
    --border: #E5E7EB;
    --correct: #16A34A;
    --perfect: #CA8A04;
    --wrong: #DC2626;
    --muted: #9CA3AF;
    --accent: #1D4ED8;
    --nav-bg: #F9FAFB;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  body { font-variant-numeric: tabular-nums; }

  /* Auth screen */
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .auth-card {
    width: 100%;
    max-width: 360px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    background: #fff;
  }
  .auth-card h1 {
    margin: 0 0 4px 0;
    font-size: 20px;
  }
  .auth-card p {
    margin: 0 0 16px 0;
    color: #555;
    font-size: 14px;
  }
  .auth-card input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font: inherit;
    margin-bottom: 12px;
  }
  .auth-card button {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    font: inherit;
    cursor: pointer;
  }
  .auth-card .error {
    color: var(--wrong);
    font-size: 14px;
    margin-top: 8px;
    min-height: 1.2em;
  }

  /* Nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 10;
    height: 52px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .nav .title {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
  }
  .nav .tabs {
    display: flex;
    gap: 4px;
    margin-left: 12px;
    flex: 1;
    overflow-x: auto;
  }
  .nav .tabs button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .nav .tabs button.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .nav .logout {
    background: transparent;
    border: none;
    color: #555;
    font: inherit;
    cursor: pointer;
    padding: 6px 8px;
    text-decoration: underline;
  }

  /* Content */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  h2.section {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin: 24px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  h2.section:first-of-type { margin-top: 0; }

  /* Poredak */
  .standings {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 600px) {
    .standings { grid-template-columns: 1fr 1fr; }
  }
  .player-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    background: #fff;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px 16px;
    align-items: center;
  }
  .player-card .rank {
    font-size: 28px;
    font-weight: 600;
    color: var(--muted);
    width: 48px;
    text-align: center;
  }
  .player-card .body {
    display: flex;
    flex-direction: column;
  }
  .player-card .name {
    font-size: 16px;
    font-weight: 600;
  }
  .player-card .pts {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin: 4px 0;
  }
  .player-card .pts small {
    font-size: 14px;
    font-weight: 400;
    color: #555;
    margin-left: 4px;
  }
  .player-card .stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    color: #555;
    font-size: 13px;
  }
  .player-card .stats b { color: var(--text); }

  /* Matches */
  .match-table-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
    margin-bottom: 16px;
    background: #fff;
    -webkit-overflow-scrolling: touch;
  }
  table.matches {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 100%;
  }
  table.matches th, table.matches td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
    white-space: nowrap;
  }
  table.matches tr:last-child td { border-bottom: none; }
  table.matches th {
    background: var(--nav-bg);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #555;
  }
  table.matches .match-info {
    position: sticky;
    left: 0;
    background: #fff;
    z-index: 1;
    border-right: 1px solid var(--border);
    min-width: 200px;
  }
  table.matches thead .match-info { background: var(--nav-bg); }
  .grupa-pill {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    margin-right: 6px;
    color: #555;
  }
  .teams { font-weight: 500; }
  .actual {
    margin-top: 2px;
    font-size: 12px;
    color: #555;
  }
  .pred {
    font-size: 13px;
    color: #555;
  }
  .icon { font-size: 16px; margin-left: 4px; }
  .icon.perfect { color: var(--perfect); }
  .icon.correct { color: var(--correct); }
  .icon.wrong { color: var(--wrong); }
  .icon.pending { color: var(--muted); }
  .player-col {
    text-align: center;
    min-width: 96px;
  }
  .player-col .name-sm {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Admin entry */
  .entry-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entry-row {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    background: #fff;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }
  .entry-row .teams-lbl {
    flex: 1 1 200px;
    font-weight: 500;
  }
  .entry-row .score-input {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .entry-row input[type="number"] {
    width: 56px;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font: inherit;
    text-align: center;
    -moz-appearance: textfield;
  }
  .entry-row input[type="number"]::-webkit-outer-spin-button,
  .entry-row input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .entry-row button {
    padding: 8px 14px;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 6px;
    font: inherit;
    cursor: pointer;
  }
  .entry-row button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .entry-row .msg {
    font-size: 13px;
    min-height: 1.2em;
  }
  .entry-row .msg.ok { color: var(--correct); }
  .entry-row .msg.err { color: var(--wrong); }
  .empty {
    color: #555;
    text-align: center;
    padding: 24px;
  }
  .loading {
    color: #555;
    text-align: center;
    padding: 32px;
  }
</style>
</head>
<body>

<div id="auth-screen" class="auth-wrap" style="display:none;">
  <div class="auth-card">
    <h1>Kladionica SP 2026</h1>
    <p>Unesite lozinku za pristup</p>
    <form id="auth-form">
      <input id="auth-pwd" type="password" autocomplete="current-password" autofocus />
      <button type="submit">Potvrdi</button>
      <div id="auth-err" class="error"></div>
    </form>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="nav">
    <span class="title">Kladionica SP 2026</span>
    <div class="tabs" id="tabs"></div>
    <button class="logout" id="logout-btn">Odjava</button>
  </div>
  <div class="content" id="content">
    <div class="loading">Učitavanje…</div>
  </div>
</div>

<script src="bets.js"></script>
<script>
(function () {
  const AUTH_KEY = 'kp2026_auth';
  const EXCLUDED = new Set(['grupa', 'datum', 'tim1', 'tim2']);

  // Derive players dynamically from first BETS entry (per requirements).
  const PLAYERS = Object.keys(BETS[0]).filter(k => !EXCLUDED.has(k));

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function getAuth() { return sessionStorage.getItem(AUTH_KEY); }
  function setAuth(v) { sessionStorage.setItem(AUTH_KEY, v); }
  function clearAuth() { sessionStorage.removeItem(AUTH_KEY); }

  // ----- Auth -----
  const VIEWER_PWD = 'Lobel';
  const ADMIN_PWD = 'Robespierre';

  function showAuth() {
    document.getElementById('auth-screen').style.display = '';
    document.getElementById('app').style.display = 'none';
  }
  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
  }

  document.getElementById('auth-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const v = document.getElementById('auth-pwd').value;
    const err = document.getElementById('auth-err');
    if (v === ADMIN_PWD) {
      setAuth('admin');
      err.textContent = '';
      init();
    } else if (v === VIEWER_PWD) {
      setAuth('viewer');
      err.textContent = '';
      init();
    } else {
      err.textContent = 'Pogrešna lozinka.';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function () {
    clearAuth();
    location.reload();
  });

  // ----- State -----
  let results = {}; // { matchIndex: "2:1" }
  let activeTab = 'poredak';

  // ----- Scoring -----
  function outcomeOf(rezultat) {
    const m = /^(\d+):(\d+)$/.exec(rezultat);
    if (!m) return null;
    const g1 = parseInt(m[1], 10), g2 = parseInt(m[2], 10);
    if (g1 > g2) return '1';
    if (g1 < g2) return '2';
    return 'X';
  }

  function scoreMatch(player, actual) {
    const actualOut = outcomeOf(actual);
    if (!actualOut) return { pts: 0, kind: 'pending' };
    if (player.rezultat === actual) return { pts: 3, kind: 'perfect' };
    if (player.ishod === actualOut) return { pts: 1, kind: 'correct' };
    return { pts: 0, kind: 'wrong' };
  }

  function computeStandings() {
    const totals = {};
    PLAYERS.forEach(p => totals[p] = { player: p, pts: 0, correct: 0, perfect: 0 });
    BETS.forEach((m, idx) => {
      const actual = results[String(idx)];
      if (!actual) return;
      PLAYERS.forEach(p => {
        const s = scoreMatch(m[p], actual);
        totals[p].pts += s.pts;
        if (s.kind === 'perfect') { totals[p].perfect += 1; totals[p].correct += 1; }
        else if (s.kind === 'correct') { totals[p].correct += 1; }
      });
    });
    return Object.values(totals).sort((a, b) => b.pts - a.pts);
  }

  // ----- API -----
  async function fetchResults() {
    const token = getAuth();
    const res = await fetch('/api/results', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }

  async function saveResult(matchIndex, rezultat) {
    const token = getAuth();
    const res = await fetch('/api/result', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({ matchIndex, rezultat }),
    });
    if (!res.ok) {
      let msg = 'HTTP ' + res.status;
      try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
      throw new Error(msg);
    }
    return true;
  }

  // ----- Rendering -----
  function renderTabs() {
    const tabs = [
      { id: 'poredak', label: 'Poredak' },
      { id: 'utakmice', label: 'Utakmice' },
    ];
    if (getAuth() === 'admin') {
      tabs.push({ id: 'unos', label: 'Unos rezultata' });
    }
    const el = document.getElementById('tabs');
    el.innerHTML = '';
    tabs.forEach(t => {
      const b = document.createElement('button');
      b.textContent = t.label;
      if (t.id === activeTab) b.classList.add('active');
      b.addEventListener('click', () => { activeTab = t.id; render(); });
      el.appendChild(b);
    });
  }

  function renderPoredak() {
    const standings = computeStandings();
    const wrap = document.createElement('div');
    wrap.className = 'standings';
    standings.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="rank">${i + 1}.</div>
        <div class="body">
          <div class="name">${cap(s.player)}</div>
          <div class="pts">${s.pts}<small>bod.</small></div>
          <div class="stats">
            <span><b>${s.correct}</b> točnih ishoda</span>
            <span><b>${s.perfect}</b> točnih rezultata</span>
          </div>
        </div>`;
      wrap.appendChild(card);
    });
    return wrap;
  }

  function groupByDate(items) {
    const groups = new Map();
    items.forEach(it => {
      const k = it.match.datum;
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(it);
    });
    return groups;
  }

  function iconFor(kind) {
    if (kind === 'perfect') return '<span class="icon perfect">★</span>';
    if (kind === 'correct') return '<span class="icon correct">✓</span>';
    if (kind === 'wrong') return '<span class="icon wrong">✗</span>';
    return '<span class="icon pending">·</span>';
  }

  function renderUtakmice() {
    const wrap = document.createElement('div');
    const all = BETS.map((m, idx) => ({ match: m, idx }));
    const grouped = groupByDate(all);

    grouped.forEach((items, datum) => {
      const h = document.createElement('h2');
      h.className = 'section';
      h.textContent = datum;
      wrap.appendChild(h);

      const tw = document.createElement('div');
      tw.className = 'match-table-wrap';

      let html = '<table class="matches"><thead><tr>';
      html += '<th class="match-info">Utakmica</th>';
      PLAYERS.forEach(p => {
        html += `<th class="player-col"><div class="name-sm">${cap(p)}</div></th>`;
      });
      html += '</tr></thead><tbody>';

      items.forEach(({ match, idx }) => {
        const actual = results[String(idx)];
        html += '<tr>';
        html += `<td class="match-info">
          <div><span class="grupa-pill">${match.grupa}</span><span class="teams">${match.tim1} – ${match.tim2}</span></div>
          <div class="actual">Rezultat: ${actual ? actual : '—'}</div>
        </td>`;
        PLAYERS.forEach(p => {
          const pred = match[p];
          const s = actual ? scoreMatch(pred, actual) : { kind: 'pending' };
          html += `<td class="player-col">
            <span class="pred">${pred.rezultat}</span>${iconFor(s.kind)}
          </td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      tw.innerHTML = html;
      wrap.appendChild(tw);
    });

    return wrap;
  }

  function renderUnos() {
    const wrap = document.createElement('div');
    const pending = BETS
      .map((m, idx) => ({ match: m, idx }))
      .filter(({ idx }) => !results[String(idx)]);

    if (pending.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'Sve utakmice su unesene.';
      wrap.appendChild(e);
      return wrap;
    }

    const grouped = groupByDate(pending);
    grouped.forEach((items, datum) => {
      const h = document.createElement('h2');
      h.className = 'section';
      h.textContent = datum;
      wrap.appendChild(h);

      const list = document.createElement('div');
      list.className = 'entry-list';

      items.forEach(({ match, idx }) => {
        const row = document.createElement('div');
        row.className = 'entry-row';
        row.innerHTML = `
          <div class="teams-lbl"><span class="grupa-pill">${match.grupa}</span>${match.tim1} – ${match.tim2}</div>
          <div class="score-input">
            <input type="number" min="0" max="99" data-side="1" />
            <span>:</span>
            <input type="number" min="0" max="99" data-side="2" />
          </div>
          <button type="button">Spremi</button>
          <div class="msg"></div>
        `;
        const inputs = row.querySelectorAll('input[type="number"]');
        const btn = row.querySelector('button');
        const msg = row.querySelector('.msg');

        btn.addEventListener('click', async () => {
          msg.className = 'msg';
          msg.textContent = '';
          const a = inputs[0].value.trim();
          const b = inputs[1].value.trim();
          if (!/^\d+$/.test(a) || !/^\d+$/.test(b)) {
            msg.className = 'msg err';
            msg.textContent = 'Unesite oba broja.';
            return;
          }
          const rezultat = `${parseInt(a, 10)}:${parseInt(b, 10)}`;
          btn.disabled = true;
          try {
            await saveResult(idx, rezultat);
            results = await fetchResults();
            msg.className = 'msg ok';
            msg.textContent = 'Spremljeno ✓';
            setTimeout(() => { render(); }, 600);
          } catch (e) {
            msg.className = 'msg err';
            msg.textContent = 'Greška: ' + e.message;
            btn.disabled = false;
          }
        });

        list.appendChild(row);
      });

      wrap.appendChild(list);
    });

    return wrap;
  }

  function render() {
    renderTabs();
    const c = document.getElementById('content');
    c.innerHTML = '';
    if (activeTab === 'poredak') c.appendChild(renderPoredak());
    else if (activeTab === 'utakmice') c.appendChild(renderUtakmice());
    else if (activeTab === 'unos' && getAuth() === 'admin') c.appendChild(renderUnos());
    else { activeTab = 'poredak'; render(); }
  }

  async function init() {
    showApp();
    const c = document.getElementById('content');
    c.innerHTML = '<div class="loading">Učitavanje…</div>';
    try {
      results = await fetchResults();
    } catch (e) {
      if (String(e.message).indexOf('401') !== -1) {
        clearAuth();
        showAuth();
        return;
      }
      c.innerHTML = '<div class="empty">Greška pri učitavanju: ' + e.message + '</div>';
      return;
    }
    render();
  }

  // ----- Boot -----
  if (getAuth()) {
    init();
  } else {
    showAuth();
  }
})();
</script>
</body>
</html>
